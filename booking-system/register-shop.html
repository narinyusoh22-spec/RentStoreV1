<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เปิดร้านค้าใหม่ — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navContent">
      <div class="d-flex align-items-center gap-2 py-2 py-lg-0 flex-wrap" id="navUser"></div>
    </div>
  </div>
</nav>

<main class="container" style="max-width:720px;">
  <div class="dash-header">
    <span class="eyebrow">สำหรับผู้ขาย</span>
    <h1>เปิดร้านค้าของคุณ</h1>
    <p class="text-secondary">กรอกข้อมูลร้านให้ครบ ลูกค้าจะได้รู้จักร้านคุณมากขึ้น</p>
  </div>

  <div id="formMsg"></div>

  <form id="shopForm" class="card shadow-sm border-0 mb-5">
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label">รูปหน้าปกร้าน</label>
        <label class="image-upload d-block" id="coverUpload" style="aspect-ratio:16/6;">
          <span id="coverLabel">คลิกเพื่ออัปโหลดรูปภาพ</span>
          <input type="file" id="coverFile" accept="image/*" />
        </label>
      </div>

      <div class="mb-3">
        <label for="shopName" class="form-label">ชื่อร้าน</label>
        <input type="text" class="form-control" id="shopName" required placeholder="เช่น สวยดี Nail & Beauty" />
      </div>

      <div class="mb-3">
        <label for="shopCategory" class="form-label">ประเภทร้าน</label>
        <select class="form-select" id="shopCategory" required>
          <option value="ความงาม & สปา">ความงาม & สปา</option>
          <option value="สุขภาพ & คลินิก">สุขภาพ & คลินิก</option>
          <option value="ร้านอาหาร & คาเฟ่">ร้านอาหาร & คาเฟ่</option>
          <option value="ฟิตเนส & กีฬา">ฟิตเนส & กีฬา</option>
          <option value="การศึกษา & ติวเตอร์">การศึกษา & ติวเตอร์</option>
          <option value="ยานยนต์">ยานยนต์</option>
          <option value="บริการทั่วไป">บริการทั่วไป</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="shopDesc" class="form-label">รายละเอียดร้าน</label>
        <textarea class="form-control" id="shopDesc" rows="3" placeholder="บอกลูกค้าเกี่ยวกับร้านของคุณ..."></textarea>
      </div>

      <div class="mb-3">
        <label for="shopAddress" class="form-label">ที่อยู่</label>
        <input type="text" class="form-control" id="shopAddress" />
      </div>

      <div class="mb-3">
        <label for="shopPhone" class="form-label">เบอร์โทรร้าน</label>
        <input type="tel" class="form-control" id="shopPhone" />
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label for="openTime" class="form-label">เวลาเปิด</label>
          <input type="time" class="form-control" id="openTime" value="09:00" required />
        </div>
        <div class="col-6">
          <label for="closeTime" class="form-label">เวลาปิด</label>
          <input type="time" class="form-control" id="closeTime" value="20:00" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">เปิดร้านและเข้าสู่แดชบอร์ด</button>
    </div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/register-shop.js"></script>
</body>
</html>
