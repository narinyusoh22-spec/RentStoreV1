<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เข้าสู่ระบบ / สมัครสมาชิก — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navContent">
      <div class="d-flex align-items-center gap-2 py-2 py-lg-0 flex-wrap" id="navUser"></div>
    </div>
  </div>
</nav>

<main class="container" style="max-width:440px;">
  <div class="my-5">
    <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-login" type="button">เข้าสู่ระบบ</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-register" type="button">สมัครสมาชิก</button>
      </li>
    </ul>

    <div id="formMsg"></div>

    <div class="tab-content">
      <!-- LOGIN -->
      <div class="tab-pane fade show active" id="tab-login">
        <form id="loginForm">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">อีเมล</label>
            <input type="email" class="form-control" id="loginEmail" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-control" id="loginPassword" required autocomplete="current-password" />
            <div class="text-end mt-1">
              <button type="button" class="btn btn-link btn-sm p-0" data-bs-toggle="modal" data-bs-target="#forgotModal">ลืมรหัสผ่าน?</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
        </form>
      </div>

      <!-- REGISTER -->
      <div class="tab-pane fade" id="tab-register">
        <form id="registerForm">
          <label class="form-label">สมัครในฐานะ</label>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <div class="role-option selected" data-role="customer">
                <div class="r-title">ลูกค้า</div>
                <div class="r-desc">ค้นหาและจองคิวร้านต่างๆ</div>
              </div>
            </div>
            <div class="col-6">
              <div class="role-option" data-role="seller">
                <div class="r-title">ผู้ขาย</div>
                <div class="r-desc">เปิดร้านและรับจองคิว</div>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label for="regName" class="form-label">ชื่อ-นามสกุล</label>
            <input type="text" class="form-control" id="regName" required />
          </div>
          <div class="mb-3">
            <label for="regPhone" class="form-label">เบอร์โทรศัพท์</label>
            <input type="tel" class="form-control" id="regPhone" placeholder="08x-xxx-xxxx" />
          </div>
          <div class="mb-3">
            <label for="regEmail" class="form-label">อีเมล</label>
            <input type="email" class="form-control" id="regEmail" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="regPassword" class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-control" id="regPassword" required minlength="6" autocomplete="new-password" />
            <div class="form-text">อย่างน้อย 6 ตัวอักษร</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">สร้างบัญชี</button>
        </form>
      </div>
    </div>
  </div>
</main>

<!-- Forgot password modal -->
<div class="modal fade" id="forgotModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">รีเซ็ตรหัสผ่าน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary small">กรอกอีเมลที่ใช้สมัครสมาชิก เราจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้</p>
        <div id="forgotMsg"></div>
        <div class="mb-3">
          <label for="forgotEmail" class="form-label">อีเมล</label>
          <input type="email" class="form-control" id="forgotEmail" required autocomplete="email" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-primary" id="sendResetBtn">ส่งลิงก์รีเซ็ต</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
