<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แดชบอร์ดผู้ขาย — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navContent">
      <div class="d-flex align-items-center gap-2 py-2 py-lg-0 flex-wrap" id="navUser"></div>
    </div>
  </div>
</nav>

<main class="container pb-5">

  <div id="noShopState" class="d-none">
    <div class="cta-banner mt-5">
      <h3>คุณยังไม่มีร้านค้า</h3>
      <p>เปิดร้านของคุณเพื่อเริ่มรับการจองจากลูกค้า</p>
      <a class="btn btn-warning" href="register-shop.html">เปิดร้านค้า</a>
    </div>
  </div>

  <div id="dashState" class="d-none">
    <div class="dash-header">
      <span class="eyebrow">แดชบอร์ดผู้ขาย</span>
      <h1 id="shopTitle">ร้านของฉัน</h1>
    </div>

    <ul class="nav nav-pills mb-4 flex-nowrap overflow-auto" id="sellerTabs">
      <li class="nav-item"><button class="nav-link active text-nowrap" data-bs-toggle="pill" data-bs-target="#panel-overview" type="button">ภาพรวม</button></li>
      <li class="nav-item"><button class="nav-link text-nowrap" data-bs-toggle="pill" data-bs-target="#panel-shop" type="button">จัดการร้าน</button></li>
      <li class="nav-item"><button class="nav-link text-nowrap" data-bs-toggle="pill" data-bs-target="#panel-services" type="button">บริการ</button></li>
      <li class="nav-item"><button class="nav-link text-nowrap" data-bs-toggle="pill" data-bs-target="#panel-bookings" type="button">รายการจอง</button></li>
      <li class="nav-item"><button class="nav-link text-nowrap" data-bs-toggle="pill" data-bs-target="#panel-reviews" type="button">รีวิว</button></li>
    </ul>

    <div class="tab-content">

      <!-- OVERVIEW -->
      <div class="tab-pane fade show active" id="panel-overview">
        <div class="row row-cols-2 row-cols-md-4 g-3 mb-4" id="statGrid"></div>
        <h3>การจองล่าสุด</h3>
        <div id="recentBookings" class="loader">กำลังโหลด...</div>
      </div>

      <!-- SHOP EDITOR -->
      <div class="tab-pane fade" id="panel-shop">
        <div id="shopFormMsg"></div>
        <form id="shopEditForm" class="row g-4">
          <div class="col-md-4">
            <label class="image-upload d-block" id="coverUpload">
              <span id="coverLabel">รูปหน้าปกร้าน</span>
              <input type="file" id="coverFile" accept="image/*" />
            </label>
          </div>
          <div class="col-md-8">
            <div class="mb-3">
              <label for="editName" class="form-label">ชื่อร้าน</label>
              <input type="text" class="form-control" id="editName" required />
            </div>
            <div class="mb-3">
              <label for="editCategory" class="form-label">ประเภทร้าน</label>
              <select class="form-select" id="editCategory">
                <option value="ความงาม & สปา">ความงาม & สปา</option>
                <option value="สุขภาพ & คลินิก">สุขภาพ & คลินิก</option>
                <option value="ร้านอาหาร & คาเฟ่">ร้านอาหาร & คาเฟ่</option>
                <option value="ฟิตเนส & กีฬา">ฟิตเนส & กีฬา</option>
                <option value="การศึกษา & ติวเตอร์">การศึกษา & ติวเตอร์</option>
                <option value="ยานยนต์">ยานยนต์</option>
                <option value="บริการทั่วไป">บริการทั่วไป</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="editDesc" class="form-label">รายละเอียดร้าน</label>
              <textarea class="form-control" id="editDesc" rows="3"></textarea>
            </div>
            <div class="mb-3">
              <label for="editAddress" class="form-label">ที่อยู่</label>
              <input type="text" class="form-control" id="editAddress" />
            </div>
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label for="editPhone" class="form-label">เบอร์โทรร้าน</label>
                <input type="tel" class="form-control" id="editPhone" />
              </div>
              <div class="col-sm-6 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="editActive" />
                  <label class="form-check-label" for="editActive">เปิดให้จองอยู่</label>
                </div>
              </div>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label for="editOpen" class="form-label">เวลาเปิด</label>
                <input type="time" class="form-control" id="editOpen" required />
              </div>
              <div class="col-sm-6">
                <label for="editClose" class="form-label">เวลาปิด</label>
                <input type="time" class="form-control" id="editClose" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary">บันทึกข้อมูลร้าน</button>
          </div>
        </form>
      </div>

      <!-- SERVICES -->
      <div class="tab-pane fade" id="panel-services">
        <div class="d-flex justify-content-end mb-3">
          <button class="btn btn-warning" id="btnAddService">+ เพิ่มบริการ</button>
        </div>
        <div id="serviceRowList" class="service-row-list loader">กำลังโหลด...</div>
      </div>

      <!-- BOOKINGS -->
      <div class="tab-pane fade" id="panel-bookings">
        <div class="d-flex flex-wrap gap-2 mb-3" id="statusFilter">
          <button class="btn btn-sm btn-outline-primary chip active" data-status="all">ทั้งหมด</button>
          <button class="btn btn-sm btn-outline-primary chip" data-status="pending">รอยืนยัน</button>
          <button class="btn btn-sm btn-outline-primary chip" data-status="confirmed">ยืนยันแล้ว</button>
          <button class="btn btn-sm btn-outline-primary chip" data-status="completed">เสร็จสิ้น</button>
          <button class="btn btn-sm btn-outline-primary chip" data-status="cancelled">ยกเลิกแล้ว</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle bg-white">
            <thead class="table-light">
              <tr><th>วันที่ / เวลา</th><th>บริการ</th><th>ลูกค้า</th><th>สถานะ</th><th>จัดการ</th></tr>
            </thead>
            <tbody id="bookingsTableBody">
              <tr><td colspan="5" class="loader">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- REVIEWS -->
      <div class="tab-pane fade" id="panel-reviews">
        <div id="reviewSummary"></div>
        <div id="reviewsList" class="loader">กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <div id="loadingState" class="loader">กำลังโหลดแดชบอร์ด...</div>
</main>

<!-- Service add/edit modal -->
<div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="svcModalTitle">เพิ่มบริการใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="svcMsg"></div>
        <label class="image-upload d-block mb-3" id="svcImgUpload" style="aspect-ratio:16/9;">
          <span id="svcImgLabel">คลิกเพื่ออัปโหลดรูปบริการ</span>
          <input type="file" id="svcImgFile" accept="image/*" />
        </label>
        <div class="mb-3">
          <label for="svcName" class="form-label">ชื่อบริการ</label>
          <input type="text" class="form-control" id="svcName" required />
        </div>
        <div class="mb-3">
          <label for="svcDesc" class="form-label">รายละเอียด</label>
          <textarea class="form-control" id="svcDesc" rows="2"></textarea>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="svcPrice" class="form-label">ราคา (บาท)</label>
            <input type="number" class="form-control" id="svcPrice" min="0" step="1" />
          </div>
          <div class="col-sm-6">
            <label for="svcDuration" class="form-label">ระยะเวลา (นาที)</label>
            <input type="number" class="form-control" id="svcDuration" min="5" step="5" />
          </div>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="svcActive" checked />
          <label class="form-check-label" for="svcActive">เปิดให้จองบริการนี้</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-primary" id="svcSave">บันทึก</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/seller-dashboard.js"></script>
</body>
</html>
