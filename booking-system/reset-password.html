<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ตั้งรหัสผ่านใหม่ — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
  </div>
</nav>

<main class="container" style="max-width:440px;">
  <div class="my-5">
    <h1 class="h3 mb-2">ตั้งรหัสผ่านใหม่</h1>
    <p class="text-secondary">กรอกรหัสผ่านใหม่ที่ต้องการใช้เข้าสู่ระบบ</p>

    <div id="resetMsg"></div>

    <form id="resetForm">
      <div class="mb-3">
        <label for="newPassword" class="form-label">รหัสผ่านใหม่</label>
        <input type="password" class="form-control" id="newPassword" required minlength="6" autocomplete="new-password" />
        <div class="form-text">อย่างน้อย 6 ตัวอักษร</div>
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่านใหม่</label>
        <input type="password" class="form-control" id="confirmPassword" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary w-100" id="resetSubmitBtn" disabled>กำลังตรวจสอบลิงก์...</button>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/reset-password.js"></script>
</body>
</html>
