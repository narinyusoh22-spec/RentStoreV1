<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>โปรไฟล์ของฉัน — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navContent">
      <div class="d-flex align-items-center gap-2 py-2 py-lg-0 flex-wrap" id="navUser"></div>
    </div>
  </div>
</nav>

<main class="container" style="max-width:560px;">
  <div class="dash-header">
    <span class="eyebrow">บัญชีของฉัน</span>
    <h1>โปรไฟล์ของฉัน</h1>
  </div>

  <div id="profileMsg"></div>

  <form id="profileForm" class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <div class="d-flex justify-content-center mb-4">
        <label class="rounded-circle image-upload" id="avatarUpload" style="width:120px;height:120px;aspect-ratio:auto;">
          <span id="avatarLabel"><i class="bi bi-person fs-1"></i></span>
          <input type="file" id="avatarFile" accept="image/*" />
        </label>
      </div>

      <div class="mb-3">
        <label for="profileName" class="form-label">ชื่อ-นามสกุล</label>
        <input type="text" class="form-control" id="profileName" required />
      </div>
      <div class="mb-3">
        <label for="profilePhone" class="form-label">เบอร์โทรศัพท์</label>
        <input type="tel" class="form-control" id="profilePhone" placeholder="08x-xxx-xxxx" />
      </div>
      <div class="mb-3">
        <label class="form-label">อีเมล</label>
        <input type="email" class="form-control" id="profileEmail" disabled />
        <div class="form-text">เปลี่ยนอีเมลไม่ได้ในขณะนี้</div>
      </div>
      <div class="mb-3">
        <label class="form-label">บทบาท</label>
        <input type="text" class="form-control" id="profileRole" disabled />
      </div>

      <button type="submit" class="btn btn-primary">บันทึกข้อมูล</button>
    </div>
  </form>

  <div class="card border-0 shadow-sm mb-5">
    <div class="card-body p-4">
      <h3 class="h5">เปลี่ยนรหัสผ่าน</h3>
      <div id="passwordMsg"></div>
      <form id="passwordForm">
        <div class="mb-3">
          <label for="newPass1" class="form-label">รหัสผ่านใหม่</label>
          <input type="password" class="form-control" id="newPass1" minlength="6" required autocomplete="new-password" />
        </div>
        <div class="mb-3">
          <label for="newPass2" class="form-label">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" class="form-control" id="newPass2" minlength="6" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-outline-primary">เปลี่ยนรหัสผ่าน</button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/profile.js"></script>
</body>
</html>
