<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>การจองของฉัน — จองคิว</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar">
  <div class="container">
    <a class="navbar-brand brand" href="index.html">จอง<span class="dot">คิว</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navContent">
      <div class="d-flex align-items-center gap-2 py-2 py-lg-0 flex-wrap" id="navUser"></div>
    </div>
  </div>
</nav>

<main class="container pb-5">
  <div class="dash-header">
    <span class="eyebrow">แดชบอร์ดลูกค้า</span>
    <h1>การจองของฉัน</h1>
  </div>

  <ul class="nav nav-pills mb-4" id="bookingTabs">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#panel-upcoming" type="button">กำลังจะถึง</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#panel-history" type="button">ประวัติการจอง</button>
    </li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="panel-upcoming">
      <div id="upcomingList" class="loader">กำลังโหลด...</div>
    </div>
    <div class="tab-pane fade" id="panel-history">
      <div id="historyList" class="loader">กำลังโหลด...</div>
    </div>
  </div>
</main>

<!-- Review modal -->
<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">ให้คะแนนร้านนี้</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="reviewMsg"></div>
        <div class="mb-3">
          <label class="form-label">คะแนน</label>
          <div class="star-input" id="starInput"></div>
        </div>
        <div class="mb-3">
          <label for="reviewComment" class="form-label">ความคิดเห็น</label>
          <textarea class="form-control" id="reviewComment" rows="3" placeholder="บอกเล่าประสบการณ์ของคุณ..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-primary" id="submitReview">ส่งรีวิว</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/customer-dashboard.js"></script>
</body>
</html>
